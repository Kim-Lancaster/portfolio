<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./game.css">
    <title>Tic Tac Toe!</title>
</head>
<body>
    <div class="whole-page grid-container">
        <h1>Tic Tac Toe!</h1>
        <div class="left grid-container">
            <div class="player">
                <h3>Player<br>Score:</h3>
                <h3 id="player-score"></h3>
            </div>
            <div class="computer">
                <h3>Computer<br>Score:</h3>
                <h3 id="computer-score"></h3>
            </div>
        </div>
        <div class="game-board grid-container">
            <div class="grid-item top right-border bottom-border" id="top-1"></div>
            <div class="grid-item top right-border bottom-border" id="top-2"></div>
            <div class="grid-item top bottom-border" id="top-3"></div>
            <div class="grid-item middle right-border bottom-border" id="middle-1"></div>
            <div class="grid-item middle right-border bottom-border" id="middle-2"></div>
            <div class="grid-item middle bottom-border" id="middle-3"></div>
            <div class="grid-item bottom right-border" id="bottom-1"></div>
            <div class="grid-item bottom right-border" id="bottom-2"></div>
            <div class="grid-item bottom" id="bottom-3"></div>
        </div>
        <div class="right grid-container">
            <h3>Top Scores!</h3>
            <div class="ranked-scores" id="ranked-scores"></div>
        </div>
        <div class="footer grid-container">
            <div class="coin">
                <p>Who goes first?</p>
                <div class="who-goes-first" id="who-goes-first">
                    <button class="coin-flip" id="coin-flip">Coin Flip!</button>
                    <div id="hidden-player">PLAYER</div>
                    <div id="hidden-computer">COMPUTER</div>
                </div>
            </div>
            <div class="symbol">
                <p>Player is X</p>
                <p>Computer is O</p>
            </div>
            <div class="winner">
                <p>Winner:</p>
                <p id="the-winner">?</p>
            </div>
            <div class="play-again">
                <button id="play-again">Play Again</button>
                <button id="create-record">Add Score</button>
            </div>
        </div>
    </div>
    <script src="./game.js"></script>
</body>
</html>
